<text x="54" y="253.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">“北京：晴，28°C，微风”</text>
<line x1="320.0" y1="190" x2="320.0" y2="210" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<rect x="40" y="296" width="560" height="58" rx="6" fill="#eef3f6" stroke="#333333" stroke-width="2"/>
