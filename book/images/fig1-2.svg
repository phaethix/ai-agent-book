<text x="54" y="337.0" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="start" dominant-baseline="central" font-weight="normal">“北京今天晴，气温约 28°C，伴有微风，适合户外活动。”</text>
<line x1="320.0" y1="274" x2="320.0" y2="294" stroke="#333333" stroke-width="2" marker-end="url(#ah)"/>
<text x="320.0" y="376" font-family="Arial, 'Helvetica Neue', Helvetica, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#666666" text-anchor="middle" dominant-baseline="central" font-weight="normal">每轮迭代后，新响应追加到轨迹末尾 → 轨迹不断增长</text>
